name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: CI_Test_Passw0rd!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'CI_Test_Passw0rd!' -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DOTNET_NOLOGO: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/Cinema.sln

      - name: Build
        run: dotnet build backend/Cinema.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/Cinema.sln --no-build -c Release --logger trx --logger "console;verbosity=normal"
        env:
          ConnectionStrings__Default: "Server=localhost,1433;Database=CinemaTest;User Id=sa;Password=CI_Test_Passw0rd!;TrustServerCertificate=True"
          Jwt__Key: "CI_TestJwtKey_AtLeast32Characters_ForTests!"
          Jwt__Issuer: "cinema-ci"
          Jwt__Audience: "cinema-ci"

  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Test
        run: npm run test:ci
        working-directory: frontend
